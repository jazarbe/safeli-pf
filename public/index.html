<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="UTF-8">
        <title>Mapa Seguridad CABA</title>
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
        <style>
        body { margin: 0; display: flex; font-family: Arial; }
        #map { height: 100vh; width: 75%; }
        #panel {
        width: 25%;
        padding: 15px;
        background: #f5f5f5;
        }
        button { width: 100%; margin-top: 10px; padding: 10px; }
        </style>
    </head>
    <body>

        <div id="map"></div>
        <div id="panel">
        <h3>Nueva zona</h3>
        <p id="coords">Click en el mapa</p>

        <select id="riesgo">
            <option value="red">Alto</option>
            <option value="orange">Medio</option>
            <option value="green">Bajo</option>
        </select>

        <input id="desc" placeholder="Descripción"/>
        <button onclick="guardarZona()">Guardar</button>
        </div>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script>
        const map = L.map('map').setView([-34.6037, -58.3816], 13);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let selectedLatLng = null;

        // Click en mapa
        map.on('click', function(e) {
        selectedLatLng = e.latlng;
        document.getElementById('coords').innerText =
            `Lat: ${e.latlng.lat}, Lng: ${e.latlng.lng}`;
        });

        // Cargar zonas
        async function cargarZonas() {
        const res = await fetch('/zonas');
        const zonas = await res.json();

        zonas.forEach(z => {
            L.circle([z.lat, z.lng], {
            color: z.riesgo,
            fillColor: z.riesgo,
            fillOpacity: 0.4,
            radius: 250
            }).addTo(map)
            .bindPopup(`${z.descripcion}<br><button onclick="eliminar(${z.id})">Eliminar</button>`);
        });
        }

        // Guardar zona
        async function guardarZona() {
        if (!selectedLatLng) {
            alert('Seleccioná un punto en el mapa');
            return;
        }

        const data = {
            lat: selectedLatLng.lat,
            lng: selectedLatLng.lng,
            riesgo: document.getElementById('riesgo').value,
            descripcion: document.getElementById('desc').value
        };

        await fetch('/zonas', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(data)
        });

        location.reload();
        }

        // Eliminar zona
        async function eliminar(id) {
        await fetch(`/zonas/${id}`, { method: 'DELETE' });
        location.reload();
        }

        cargarZonas();
        </script>
    </body>
</html>
