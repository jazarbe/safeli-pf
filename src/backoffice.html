<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Backoffice — Delitos</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:        #0d0f12;
    --surface:   #13161b;
    --surface2:  #1a1e26;
    --border:    #232830;
    --border2:   #2e3440;
    --accent:    #4f8ef7;
    --accent2:   #7bb3ff;
    --danger:    #f75f5f;
    --warn:      #f7b74f;
    --ok:        #4ff7a0;
    --text:      #e2e8f0;
    --muted:     #64748b;
    --mono:      'IBM Plex Mono', monospace;
    --sans:      'IBM Plex Sans', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
  }

  /* ─── HEADER ─── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 32px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .logo span { color: var(--muted); font-weight: 400; }
  .header-stats {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
  }
  .header-stats b { color: var(--text); }

  /* ─── LAYOUT ─── */
  .layout {
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: calc(100vh - 53px);
  }

  /* ─── SIDEBAR ─── */
  aside {
    border-right: 1px solid var(--border);
    background: var(--surface);
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    overflow-y: auto;
  }
  .filter-section-title {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .filter-group { display: flex; flex-direction: column; gap: 8px; }
  .filter-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  input, select {
    width: 100%;
    padding: 8px 10px;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    outline: none;
    transition: border-color .15s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  select option { background: var(--surface2); }

  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }

  .btn {
    padding: 9px 16px;
    border-radius: 6px;
    border: none;
    cursor: pointer;
    font-family: var(--mono);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    transition: opacity .15s, transform .1s;
  }
  .btn:active { transform: scale(.97); }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost   { background: transparent; color: var(--muted); border: 1px solid var(--border2); }
  .btn-ghost:hover { color: var(--text); border-color: var(--border2); }
  .btn-danger  { background: transparent; color: var(--danger); border: 1px solid #f75f5f44; }
  .btn-danger:hover { background: #f75f5f15; }

  .filter-actions { display: flex; flex-direction: column; gap: 8px; }

  /* ─── IMPORTAR ─── */
  .import-box {
    margin-top: auto;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .file-drop {
    border: 1px dashed var(--border2);
    border-radius: 8px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  .file-drop:hover { border-color: var(--accent); background: #4f8ef708; }
  .file-drop.dragging { border-color: var(--accent); background: #4f8ef715; }
  .file-drop-icon { font-size: 20px; margin-bottom: 4px; }
  .file-drop-text { font-size: 11px; color: var(--muted); }
  .file-drop-text b { color: var(--accent); }
  #file-name { font-family: var(--mono); font-size: 11px; color: var(--ok); text-align: center; display: none; }
  #import-result {
    font-family: var(--mono);
    font-size: 11px;
    padding: 8px 10px;
    border-radius: 6px;
    display: none;
  }
  #import-result.ok   { background: #4ff7a015; color: var(--ok);    border: 1px solid #4ff7a040; }
  #import-result.err  { background: #f75f5f15; color: var(--danger); border: 1px solid #f75f5f40; }

  /* ─── MAIN ─── */
  main { display: flex; flex-direction: column; overflow: hidden; }

  .toolbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    gap: 12px;
    flex-wrap: wrap;
  }
  .toolbar-left { display: flex; align-items: center; gap: 16px; }
  .result-count { font-family: var(--mono); font-size: 12px; color: var(--muted); }
  .result-count b { color: var(--text); }

  .sort-row { display: flex; align-items: center; gap: 8px; }
  .sort-row label { font-size: 11px; color: var(--muted); white-space: nowrap; }
  .sort-row select { width: auto; padding: 6px 10px; }

  .page-size-row { display: flex; align-items: center; gap: 8px; }
  .page-size-row label { font-size: 11px; color: var(--muted); }
  .page-size-row select { width: auto; padding: 6px 10px; }

  /* ─── TABLE ─── */
  .table-wrap { flex: 1; overflow: auto; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-family: var(--mono);
    font-size: 12px;
  }
  thead { position: sticky; top: 0; z-index: 10; }
  thead tr { background: var(--surface2); }
  th {
    padding: 12px 16px;
    text-align: left;
    font-weight: 600;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    border-bottom: 1px solid var(--border2);
    white-space: nowrap;
    cursor: pointer;
    user-select: none;
    transition: color .15s;
  }
  th:hover { color: var(--text); }
  th.active { color: var(--accent); }
  .sort-icon { margin-left: 4px; opacity: 0.5; }
  th.active .sort-icon { opacity: 1; }

  tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background .1s;
  }
  tbody tr:hover { background: var(--surface2); }
  td { padding: 11px 16px; vertical-align: middle; }

  .td-id { color: var(--muted); }
  .td-id b { color: var(--accent2); }

  .td-ubicacion { font-size: 11px; color: var(--muted); max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .td-fecha { color: var(--text); letter-spacing: 0.05em; }

  .gravedad-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 9px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
  }
  .gravedad-pill.alta   { background: #f75f5f18; color: var(--danger); border: 1px solid #f75f5f40; }
  .gravedad-pill.media  { background: #f7b74f18; color: var(--warn);   border: 1px solid #f7b74f40; }
  .gravedad-pill.baja   { background: #4ff7a018; color: var(--ok);     border: 1px solid #4ff7a040; }

  .td-tipo { color: var(--text); font-weight: 500; text-transform: capitalize; }
  .td-subtipo { color: var(--muted); text-transform: capitalize; }
  .td-idsubtipo { color: var(--muted); }

  .empty-state {
    padding: 80px 40px;
    text-align: center;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 13px;
  }
  .empty-state .empty-icon { font-size: 36px; margin-bottom: 12px; opacity: 0.4; }

  /* ─── SKELETON ─── */
  @keyframes shimmer { 0%,100%{opacity:.4} 50%{opacity:.9} }
  .skel { 
    height: 12px; border-radius: 3px; background: var(--border2); 
    animation: shimmer 1.2s ease-in-out infinite;
  }
  .skel.w60  { width: 60%; }
  .skel.w80  { width: 80%; }
  .skel.w40  { width: 40%; }
  .skel.w30  { width: 30%; }

  /* ─── PAGINACIÓN ─── */
  .pagination {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    padding: 16px 24px;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .pg-btn {
    min-width: 34px;
    height: 34px;
    padding: 0 10px;
    border-radius: 6px;
    border: 1px solid var(--border2);
    background: transparent;
    color: var(--muted);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .pg-btn:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
  .pg-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .pg-btn:disabled { opacity: 0.3; cursor: default; }
  .pg-ellipsis { color: var(--muted); font-family: var(--mono); font-size: 12px; padding: 0 4px; }

  /* ─── LOADER OVERLAY ─── */
  #loader {
    position: fixed; inset: 0; background: #0d0f12cc;
    display: flex; align-items: center; justify-content: center;
    z-index: 999; display: none;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border2);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin .6s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<header>
  <div class="logo">SAFE<span>ROUTE</span> / backoffice</div>
  <div class="header-stats" id="header-stats">Cargando...</div>
</header>

<div class="layout">

  <!-- ─── SIDEBAR ─── -->
  <aside>
    <div class="filter-section-title">Filtros</div>

    <div class="filter-group">
      <div class="filter-label">Rango de ID</div>
      <div class="row2">
        <input type="number" id="f-id-desde" placeholder="Desde"/>
        <input type="number" id="f-id-hasta" placeholder="Hasta"/>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-label">Período</div>
      <div class="row2">
        <select id="f-mes">
          <option value="">Mes</option>
          <option value="1">Enero</option><option value="2">Febrero</option>
          <option value="3">Marzo</option><option value="4">Abril</option>
          <option value="5">Mayo</option><option value="6">Junio</option>
          <option value="7">Julio</option><option value="8">Agosto</option>
          <option value="9">Septiembre</option><option value="10">Octubre</option>
          <option value="11">Noviembre</option><option value="12">Diciembre</option>
        </select>
        <input type="number" id="f-anio" placeholder="Año" min="2000" max="2099"/>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-label">Gravedad</div>
      <div class="row2">
        <input type="number" id="f-grav-min" placeholder="Mín" step="0.1"/>
        <input type="number" id="f-grav-max" placeholder="Máx" step="0.1"/>
      </div>
    </div>

    <div class="filter-group">
      <div class="filter-label">Tipo de delito</div>
      <select id="f-tipo">
        <option value="">Todos los tipos</option>
      </select>
    </div>

    <div class="filter-group">
      <div class="filter-label">Subtipo</div>
      <select id="f-subtipo">
        <option value="">Todos los subtipos</option>
      </select>
    </div>

    <div class="filter-actions">
      <button class="btn btn-primary" id="btn-aplicar">Aplicar filtros</button>
      <button class="btn btn-ghost"   id="btn-limpiar">Limpiar</button>
    </div>

    <!-- Importar -->
    <div class="import-box">
      <div class="filter-section-title">Importar datos</div>
      <div class="file-drop" id="file-drop">
        <div class="file-drop-icon">📂</div>
        <div class="file-drop-text">Arrastrá o <b>seleccioná</b> un Excel</div>
        <input type="file" id="file-input" accept=".xlsx,.xls" style="display:none"/>
      </div>
      <div id="file-name"></div>
      <button class="btn btn-primary" id="btn-importar" disabled>Importar</button>
      <div id="import-result"></div>
    </div>
  </aside>

  <!-- ─── MAIN ─── -->
  <main>
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="result-count" id="result-count">─</div>
        <div class="sort-row">
          <label>Ordenar por</label>
          <select id="sort-by">
            <option value="id">ID</option>
            <option value="fecha">Fecha</option>
            <option value="gravedad">Gravedad</option>
            <option value="idSubtipo">Subtipo ID</option>
          </select>
          <select id="sort-dir">
            <option value="asc">↑ ASC</option>
            <option value="desc">↓ DESC</option>
          </select>
        </div>
      </div>
      <div class="page-size-row">
        <label>Filas</label>
        <select id="page-size">
          <option value="25">25</option>
          <option value="50" selected>50</option>
          <option value="100">100</option>
          <option value="200">200</option>
        </select>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th data-col="id"        class="active">ID <span class="sort-icon">↑</span></th>
            <th>Ubicación</th>
            <th data-col="fecha">Fecha <span class="sort-icon">↕</span></th>
            <th data-col="gravedad">Gravedad <span class="sort-icon">↕</span></th>
            <th>Tipo</th>
            <th>Subtipo</th>
            <th data-col="idSubtipo">ID Subtipo <span class="sort-icon">↕</span></th>
          </tr>
        </thead>
        <tbody id="table-body">
          <!-- rows injected by JS -->
        </tbody>
      </table>
      <div class="empty-state" id="empty-state" style="display:none">
        <div class="empty-icon">🔍</div>
        No se encontraron registros con los filtros aplicados.
      </div>
    </div>

    <div class="pagination" id="pagination"></div>
  </main>

</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────────────────────────
const API_BASE = '/delitos';

// ─── STATE ────────────────────────────────────────────────────────────────────
let state = {
  page:      1,
  page_size: 50,
  sort_by:   'id',
  sort_dir:  'asc',
  total:     0,
  total_pages: 1,
  loading:   false,
};

// ─── HELPERS ─────────────────────────────────────────────────────────────────
function getFilters() {
  return {
    id_desde:    document.getElementById('f-id-desde').value.trim()   || undefined,
    id_hasta:    document.getElementById('f-id-hasta').value.trim()   || undefined,
    mes:         document.getElementById('f-mes').value               || undefined,
    anio:        document.getElementById('f-anio').value.trim()       || undefined,
    gravedad_min:document.getElementById('f-grav-min').value.trim()   || undefined,
    gravedad_max:document.getElementById('f-grav-max').value.trim()   || undefined,
    id_subtipo:  document.getElementById('f-subtipo').value           || undefined,
  };
}

function buildQuery(extra = {}) {
  const params = {
    page:      state.page,
    page_size: state.page_size,
    sort_by:   state.sort_by,
    sort_dir:  state.sort_dir,
    ...getFilters(),
    ...extra,
  };
  return Object.entries(params)
    .filter(([, v]) => v !== undefined && v !== '')
    .map(([k, v]) => `${encodeURIComponent(k)}=${encodeURIComponent(v)}`)
    .join('&');
}

function gravedadClass(g) {
  if (g === null || g === undefined) return '';
  if (g >= 6)  return 'alta';
  if (g >= 3)  return 'media';
  return 'baja';
}

function showLoader(v) {
  document.getElementById('loader').style.display = v ? 'flex' : 'none';
}

// ─── FETCH DATOS ─────────────────────────────────────────────────────────────
async function fetchData() {
  if (state.loading) return;
  state.loading = true;
  showLoader(true);
  renderSkeleton();

  try {
    const res  = await fetch(`${API_BASE}/delitos?${buildQuery()}`);
    const json = await res.json();

    if (!res.ok) throw new Error(json.details || json.message || 'Error del servidor');

    state.total       = json.total;
    state.total_pages = json.total_pages;

    renderTable(json.data);
    renderPagination();
    document.getElementById('result-count').innerHTML =
      `<b>${json.total.toLocaleString('es-AR')}</b> registros · página <b>${json.page}</b> / <b>${json.total_pages}</b>`;
    document.getElementById('header-stats').innerHTML =
      `Total en DB: <b>${json.total.toLocaleString('es-AR')}</b> delitos`;
  } catch (e) {
    document.getElementById('table-body').innerHTML =
      `<tr><td colspan="7" style="color:var(--danger);padding:24px;font-family:var(--mono);font-size:12px;">
        ⚠ Error: ${e.message}</td></tr>`;
  } finally {
    state.loading = false;
    showLoader(false);
  }
}

// ─── RENDER TABLE ─────────────────────────────────────────────────────────────
function renderSkeleton() {
  const tbody = document.getElementById('table-body');
  tbody.innerHTML = Array.from({ length: 12 }).map(() => `
    <tr>
      <td><div class="skel w30"></div></td>
      <td><div class="skel w80"></div></td>
      <td><div class="skel w40"></div></td>
      <td><div class="skel w30"></div></td>
      <td><div class="skel w60"></div></td>
      <td><div class="skel w60"></div></td>
      <td><div class="skel w30"></div></td>
    </tr>`).join('');
}

function renderTable(rows) {
  const empty = document.getElementById('empty-state');
  const tbody = document.getElementById('table-body');

  if (!rows || rows.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = rows.map(r => {
    const gc = gravedadClass(r.gravedad);
    const gv = r.gravedad !== null ? r.gravedad : '—';
    return `
    <tr>
      <td class="td-id"><b>${r.id}</b></td>
      <td class="td-ubicacion" title="${r.ubicacion ?? ''}">${r.ubicacion ?? '—'}</td>
      <td class="td-fecha">${r.fecha ?? '—'}</td>
      <td>
        ${gc
          ? `<span class="gravedad-pill ${gc}">${gv}</span>`
          : `<span style="color:var(--muted)">—</span>`
        }
      </td>
      <td class="td-tipo">${r.tipo ?? '—'}</td>
      <td class="td-subtipo">${r.subtipo ?? '—'}</td>
      <td class="td-idsubtipo">${r.idSubtipo ?? '—'}</td>
    </tr>`;
  }).join('');
}

// ─── PAGINACIÓN ───────────────────────────────────────────────────────────────
function renderPagination() {
  const container = document.getElementById('pagination');
  const { page, total_pages: tp } = state;
  if (tp <= 1) { container.innerHTML = ''; return; }

  const pages = [];
  if (tp <= 9) {
    for (let i = 1; i <= tp; i++) pages.push(i);
  } else {
    pages.push(1);
    if (page > 4) pages.push('…');
    for (let i = Math.max(2, page - 2); i <= Math.min(tp - 1, page + 2); i++) pages.push(i);
    if (page < tp - 3) pages.push('…');
    pages.push(tp);
  }

  container.innerHTML = `
    <button class="pg-btn" id="pg-prev" ${page === 1 ? 'disabled' : ''}>‹ Ant</button>
    ${pages.map(p => p === '…'
      ? `<span class="pg-ellipsis">···</span>`
      : `<button class="pg-btn ${p === page ? 'active' : ''}" data-page="${p}">${p}</button>`
    ).join('')}
    <button class="pg-btn" id="pg-next" ${page === tp ? 'disabled' : ''}>Sig ›</button>`;

  container.querySelectorAll('[data-page]').forEach(btn => {
    btn.addEventListener('click', () => goToPage(parseInt(btn.dataset.page)));
  });
  container.querySelector('#pg-prev')?.addEventListener('click', () => goToPage(page - 1));
  container.querySelector('#pg-next')?.addEventListener('click', () => goToPage(page + 1));
}

function goToPage(p) {
  if (p < 1 || p > state.total_pages) return;
  state.page = p;
  fetchData();
}

// ─── SORTING DESDE HEADERS ────────────────────────────────────────────────────
document.querySelectorAll('th[data-col]').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (state.sort_by === col) {
      state.sort_dir = state.sort_dir === 'asc' ? 'desc' : 'asc';
    } else {
      state.sort_by  = col;
      state.sort_dir = 'asc';
    }
    document.getElementById('sort-by').value  = state.sort_by;
    document.getElementById('sort-dir').value = state.sort_dir;
    document.querySelectorAll('th[data-col]').forEach(t => {
      t.classList.remove('active');
      t.querySelector('.sort-icon').textContent = '↕';
    });
    th.classList.add('active');
    th.querySelector('.sort-icon').textContent = state.sort_dir === 'asc' ? '↑' : '↓';
    state.page = 1;
    fetchData();
  });
});

// ─── CONTROLES TOOLBAR ────────────────────────────────────────────────────────
document.getElementById('sort-by').addEventListener('change', e => {
  state.sort_by = e.target.value;
  state.page = 1;
  fetchData();
});
document.getElementById('sort-dir').addEventListener('change', e => {
  state.sort_dir = e.target.value;
  state.page = 1;
  fetchData();
});
document.getElementById('page-size').addEventListener('change', e => {
  state.page_size = parseInt(e.target.value);
  state.page = 1;
  fetchData();
});

// ─── FILTROS ─────────────────────────────────────────────────────────────────
document.getElementById('btn-aplicar').addEventListener('click', () => {
  state.page = 1;
  fetchData();
});
document.getElementById('btn-limpiar').addEventListener('click', () => {
  ['f-id-desde','f-id-hasta','f-mes','f-anio','f-grav-min','f-grav-max','f-tipo','f-subtipo']
    .forEach(id => { document.getElementById(id).value = ''; });
  state.page = 1;
  fetchData();
});

// ─── CASCADE TIPO → SUBTIPO ───────────────────────────────────────────────────
document.getElementById('f-tipo').addEventListener('change', async function() {
  const idTipo = this.value;
  const sel = document.getElementById('f-subtipo');
  sel.innerHTML = '<option value="">Todos los subtipos</option>';
  if (!idTipo) return;
  try {
    const res  = await fetch(`${API_BASE}/subtipos?idTipo=${idTipo}`);
    const data = await res.json();
    data.forEach(s => {
      const o = document.createElement('option');
      o.value = s.id;
      o.textContent = s.nombre;
      sel.appendChild(o);
    });
  } catch {}
});

// ─── CARGA INICIAL DE TIPOS ───────────────────────────────────────────────────
async function loadTipos() {
  try {
    const res  = await fetch(`${API_BASE}/tipos`);
    const data = await res.json();
    const sel  = document.getElementById('f-tipo');
    data.forEach(t => {
      const o = document.createElement('option');
      o.value = t.id;
      o.textContent = t.nombre;
      sel.appendChild(o);
    });
  } catch {}
}

// ─── IMPORTAR ─────────────────────────────────────────────────────────────────
const fileDrop  = document.getElementById('file-drop');
const fileInput = document.getElementById('file-input');
const fileName  = document.getElementById('file-name');
const btnImport = document.getElementById('btn-importar');
const importRes = document.getElementById('import-result');
let selectedFile = null;

fileDrop.addEventListener('click', () => fileInput.click());
fileDrop.addEventListener('dragover', e => { e.preventDefault(); fileDrop.classList.add('dragging'); });
fileDrop.addEventListener('dragleave', () => fileDrop.classList.remove('dragging'));
fileDrop.addEventListener('drop', e => {
  e.preventDefault();
  fileDrop.classList.remove('dragging');
  const f = e.dataTransfer.files[0];
  if (f) setFile(f);
});
fileInput.addEventListener('change', () => { if (fileInput.files[0]) setFile(fileInput.files[0]); });

function setFile(f) {
  selectedFile = f;
  fileName.textContent = `📄 ${f.name}`;
  fileName.style.display = 'block';
  btnImport.disabled = false;
  importRes.style.display = 'none';
}

btnImport.addEventListener('click', async () => {
  if (!selectedFile) return;
  showLoader(true);
  btnImport.disabled = true;
  importRes.style.display = 'none';
  const fd = new FormData();
  fd.append('archivo', selectedFile);
  try {
    const res  = await fetch('/importar', { method: 'POST', body: fd });
    const json = await res.json();
    importRes.className = res.ok && json.success ? 'ok' : 'err';
    importRes.textContent = json.message || json.error || JSON.stringify(json);
    importRes.style.display = 'block';
    if (res.ok && json.success) fetchData();
  } catch (e) {
    importRes.className = 'err';
    importRes.textContent = 'Error de red: ' + e.message;
    importRes.style.display = 'block';
  } finally {
    showLoader(false);
    btnImport.disabled = false;
  }
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
loadTipos();
fetchData();
</script>
</body>
</html>
